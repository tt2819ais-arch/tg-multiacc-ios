name: iOS Build

on:
  push:
    branches: [ main, 'devin/**' ]
    tags:    [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write   # needed to create releases on tag pushes

jobs:
  build-ipa:
    name: Build unsigned .ipa
    runs-on: macos-14
    timeout-minutes: 60

    env:
      SCHEME: TGMultiAcc
      PROJECT: TGMultiAcc.xcodeproj
      DERIVED: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      - name: Select Xcode
        run: |
          ls /Applications | grep -i Xcode || true
          # Prefer Xcode 16 (matches xcodegen default project format), fall back to 15.x
          for v in Xcode_16.4 Xcode_16.3 Xcode_16.2 Xcode_16.1 Xcode_16.0 Xcode_16 Xcode_15.4 Xcode_15.3 Xcode_15.2 Xcode_15.1 Xcode_15.0; do
            if [ -d "/Applications/$v.app" ]; then
              sudo xcode-select -s "/Applications/$v.app"
              echo "Selected: $v"
              break
            fi
          done
          xcodebuild -version

      - name: Install build tools
        run: brew install xcodegen xcbeautify

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Cache SwiftPM artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
          key: ${{ runner.os }}-spm-${{ hashFiles('**/project.yml') }}-v3
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Resolve SwiftPM dependencies
        run: |
          xcodebuild \
            -resolvePackageDependencies \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -clonedSourcePackagesDirPath SourcePackages

      - name: Build (unsigned, iphoneos)
        run: |
          set -o pipefail
          xcodebuild \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath "$DERIVED" \
            -clonedSourcePackagesDirPath SourcePackages \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            ONLY_ACTIVE_ARCH=NO \
            ENABLE_BITCODE=NO \
            build 2>&1 | tee xcodebuild.log | xcbeautify || (echo "::error::xcodebuild failed"; echo "----- raw xcodebuild errors -----"; grep -E " error:|fatal error|Undefined symbol|cannot find|reference to|expected|use of unresolved|SwiftCompile" xcodebuild.log | head -200; exit 1)

      - name: Locate .app bundle
        id: locate
        run: |
          APP=$(find "$DERIVED/Build/Products" -maxdepth 4 -type d -name "${SCHEME}.app" | head -n 1)
          if [ -z "$APP" ]; then
            echo "::error::No .app produced by xcodebuild"
            find "$DERIVED" -maxdepth 5 -type d | head -50
            exit 1
          fi
          echo "Found app at: $APP"
          echo "app_path=$APP" >> "$GITHUB_OUTPUT"

      - name: Package .ipa (unsigned)
        run: |
          mkdir -p Payload
          cp -R "${{ steps.locate.outputs.app_path }}" Payload/
          # Strip extended attributes that occasionally break codesign verification.
          xattr -cr Payload || true
          zip -qry "${SCHEME}.ipa" Payload
          rm -rf Payload
          ls -la "${SCHEME}.ipa"
          unzip -l "${SCHEME}.ipa" | head -20

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: TGMultiAcc-unsigned-ipa
          path: TGMultiAcc.ipa
          if-no-files-found: error
          retention-days: 30

      - name: Attach .ipa to GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: TGMultiAcc.ipa
          fail_on_unmatched_files: true
          generate_release_notes: true

      - name: Build summary
        if: always()
        run: |
          {
            echo "### iOS build summary"
            echo
            echo "- Scheme: $SCHEME"
            echo "- SDK: iphoneos (unsigned, Release)"
            if [ -f "${SCHEME}.ipa" ]; then
              SIZE=$(du -sh "${SCHEME}.ipa" | cut -f1)
              echo "- IPA: \`${SCHEME}.ipa\` ($SIZE)"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
